version: '3.9'

services:
  db:
    image: whereq-postgres:17
    container_name: catobigato-db
    environment:
      POSTGRES_DB: catobigato
      POSTGRES_USER: whereq
      POSTGRES_PASSWORD: whereq123
    ports:
      - "5433:5432"
    volumes:
      - catobigato_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "whereq"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catobigato-web
    environment:
      - DJANGO_ENV=development
      - DB_HOST=catobigato-db
      - DB_PORT=5432
      - DB_NAME=catobigato
      - DB_USER=whereq
      - DB_PASSWORD=whereq123
      - KEYCLOAK_URL=http://keycloak:8888
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    volumes:
      - .:/app
    command: python manage.py runserver 0.0.0.0:8000

  # keycloak:
  #   image: whereq/keycloak-k2m:latest
  #   container_name: catobigato-keycloak
  #   ports:
  #     - "8888:8080"
